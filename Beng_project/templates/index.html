<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Route Finder</title>
</head>
<body>
    <h1>최단 경로 탐색기</h1>

    <form id="route-form">
        <label for="start">출발지:</label>
        <input type="text" id="start" name="start" required>
        <br>
        <label for="end">목적지:</label>
        <input type="text" id="end" name="end" required>
        <br>
        <button type="button" onclick="findShortestPath()">최단경로찾기</button>
    </form>

    <div id="result">
        <!-- Results will be displayed here -->
    </div>

    <script>
        function findShortestPath() {
            var startNode = document.getElementById('start').value;
            var endNode = document.getElementById('end').value;

            // Make an AJAX request to the server
            fetch('/find_shortest_path', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    start: startNode,
                    end: endNode
                }),
            })
            .then(response => response.json())
            .then(data => {
                // Display results in the 'result' div
                document.getElementById('result').innerHTML = `<p>Shortest Path: ${data.path.join(' -> ')}</p>
                                                                <p>Total Distance: ${data.total_distance} km</p>`;
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
